<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday ❤️</title>

    <link rel="stylesheet" href="bday.css">
</head>

<body>

    <!-- ================= Background ================= -->

    <div class="background-gradient"></div>

    <div class="sparkles"></div>

    <div class="floating-hearts"></div>

    <div class="confetti-container"></div>

    <div class="balloon-container"></div>

    <div class="fireworks-container"></div>


    <!-- ================= Countdown ================= -->

    <section id="countdown-screen">

        <h1 id="countdown-number">3</h1>

    </section>



    <!-- ================= Birthday Content ================= -->

    <section id="birthday-screen" class="hidden">


        <!-- Happy Birthday Text -->

        <div id="birthday-title">

            <h1>
                Happy Birthday
                <span id="birthday-name">Vignesh ❤️</span>
            </h1>

        </div>



        <!-- Cake Section -->

        <div id="cake-area">

            <!-- Glow -->

            <div class="cake-glow"></div>


            <!-- Cake Stand -->

            <div class="cake-stand"></div>


            <!-- Cake -->

            <div id="cake">


                <!-- Plate -->

                <div id="cake-plate"></div>


                <!-- Bottom Layer -->

                <div class="cake-layer layer1">

                    <div class="cream cream1"></div>

                </div>


                <!-- Middle Layer -->

                <div class="cake-layer layer2">

                    <div class="cream cream2"></div>

                </div>


                <!-- Top Layer -->

                <div class="cake-layer layer3">

                    <div class="cream cream3"></div>

                </div>



                <!-- Candles -->

                <div id="candles">

                    <div class="candle">
                        <div class="flame"></div>
                    </div>

                    <div class="candle">
                        <div class="flame"></div>
                    </div>

                    <div class="candle">
                        <div class="flame"></div>
                    </div>

                    <div class="candle">
                        <div class="flame"></div>
                    </div>

                    <div class="candle">
                        <div class="flame"></div>
                    </div>

                </div>

            </div>

        </div>



        <!-- Button -->

        <button id="gift-button">

            🎁 Unlock Gifts

        </button>

        <button id="blow-candles-btn">
    💨 Blow Candles
</button>



        <!-- Music Toggle -->

        <button id="music-btn">

            🎵

        </button>


    </section>



    <!-- ================= Audio ================= -->

    <audio id="birthday-music" loop>

        <source src="birthday.mp3" type="audio/mpeg">

    </audio>



    <!-- ================= JavaScript ================= -->

    <script src="bday.js"></script>

</body>

</html>
