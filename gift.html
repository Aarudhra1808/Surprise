<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Gift</title>

    <link rel="stylesheet" href="gift.css">

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Floating Sparkles -->
    <div class="sparkles"></div>

    <!-- Main Content -->
    <div class="container">

        <h1 class="title">
            A Few Little Surprises For You 💙
        </h1>

        <p class="subtitle">
            Choose a gift to continue your adventure...
        </p>

        <div class="gift-container">

            <!-- Gift 1 -->
            <div class="gift-box"  data-id="gift1" data-page="letter.html">

                <div class="gift-lid"></div>

                <div class="gift-ribbon-vertical"></div>

                <div class="gift-ribbon-horizontal"></div>

                <div class="gift-shadow"></div>

            </div>

            <!-- Gift 2 -->
            <div class="gift-box"  data-id="gift2" data-page="melody.html">

                <div class="gift-lid"></div>

                <div class="gift-ribbon-vertical"></div>

                <div class="gift-ribbon-horizontal"></div>

                <div class="gift-shadow"></div>

            </div>

            <!-- Gift 3 -->
            <div class="gift-box"  data-id="gift3" data-page="journey.html">

                <div class="gift-lid"></div>

                <div class="gift-ribbon-vertical"></div>

                <div class="gift-ribbon-horizontal"></div>

                <div class="gift-shadow"></div>

            </div>

        </div>

    </div>

    <script src="gift.js"></script>

</body>
</html>
